<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <!-- Favicon -->
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <link rel="alternate icon" href="/favicon.ico" sizes="any">

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1" />

    <!-- Preconnect to third-party origins -->
    <link rel="preconnect" href="https://terra.dev" crossorigin>
    <link rel="dns-prefetch" href="https://terra.dev">
    <link rel="preconnect" href="https://assets.terra.dev" crossorigin>
    <link rel="dns-prefetch" href="https://assets.terra.dev">

    <!-- Site-wide Schema.org structured data (static fallback for non-JS crawlers).
         Per-page Schema (Article, BreadcrumbList, FAQPage) is injected by each route. -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Wyszukiwarka Kodów PKD",
      "url": "https://kodypkd.app",
      "description": "Darmowa wyszukiwarka kodów PKD. Opisz swoją działalność, a AI dopasuje odpowiednie kody Polskiej Klasyfikacji Działalności.",
      "inLanguage": "pl-PL",
      "potentialAction": {
        "@type": "SearchAction",
        "target": {
          "@type": "EntryPoint",
          "urlTemplate": "https://kodypkd.app/kody-pkd/{search_term_string}"
        },
        "query-input": "required name=search_term_string"
      }
    }
    </script>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "kodypkd.app",
      "url": "https://kodypkd.app",
      "logo": "https://kodypkd.app/favicon.svg",
      "description": "Serwis umożliwiający wyszukiwanie kodów Polskiej Klasyfikacji Działalności (PKD) za pomocą algorytmu AI."
    }
    </script>

    <!-- Service worker registration for bfcache support -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/bfcache-sw.js').catch(() => {});
        });
      }

      window.addEventListener('beforeunload', (e) => {
        e.preventDefault();
        e.returnValue = false;
        return false;
      }, { capture: true });

      document.addEventListener('visibilitychange', () => {
        if (document.visibilityState === 'hidden') {
          const controller = window._abortController;
          if (controller) {
            controller.abort();
            window._abortController = null;
          }
        }
      });

      window.addEventListener('pageshow', (event) => {
        if (event.persisted) {
          const urlParams = new URLSearchParams(window.location.search);
          const serviceDescription = urlParams.get('serviceDescription');
          if (serviceDescription) {
            sessionStorage.setItem('bfcache-restored', 'true');
            sessionStorage.setItem('last-service-description', serviceDescription);
          }
        }
      });
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
