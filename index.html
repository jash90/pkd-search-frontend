<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <!-- Favicon -->
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <link rel="alternate icon" href="/favicon.ico" sizes="any">
    
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="index, follow" />
    <meta name="bfcache-restore" content="true" />
    <meta name="back-forward-navigation" content="enable" />
    
    <!-- Preconnect to third-party origins -->
    <link rel="preconnect" href="https://terra.dev" crossorigin>
    <link rel="dns-prefetch" href="https://terra.dev">
    <link rel="preconnect" href="https://assets.terra.dev" crossorigin>
    <link rel="dns-prefetch" href="https://assets.terra.dev">
    
    <title>Wyszukiwarka Kodów PKD | Znajdź kod PKD dla swojej działalności</title>
    <meta name="description" content="Darmowa wyszukiwarka kodów PKD. Opisz swoją działalność gospodarczą, a inteligentny algorytm AI dopasuje najlepsze kody Polskiej Klasyfikacji Działalności." />

    <!-- Open Graph -->
    <meta property="og:title" content="Wyszukiwarka Kodów PKD | Znajdź kod PKD dla swojej działalności" />
    <meta property="og:description" content="Darmowa wyszukiwarka kodów PKD. Opisz swoją działalność, a AI dopasuje odpowiednie kody Polskiej Klasyfikacji Działalności." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://kodypkd.app/" />
    <meta property="og:locale" content="pl_PL" />
    <meta property="og:site_name" content="kodypkd.app" />

    <!-- Schema.org structured data (static fallback for non-JS crawlers) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Wyszukiwarka Kodów PKD",
      "url": "https://kodypkd.app",
      "description": "Darmowa wyszukiwarka kodów PKD. Opisz swoją działalność, a AI dopasuje odpowiednie kody Polskiej Klasyfikacji Działalności.",
      "potentialAction": {
        "@type": "SearchAction",
        "target": {
          "@type": "EntryPoint",
          "urlTemplate": "https://kodypkd.app/kody-pkd/{search_term_string}"
        },
        "query-input": "required name=search_term_string"
      }
    }
    </script>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "kodypkd.app",
      "url": "https://kodypkd.app",
      "description": "Serwis umożliwiający wyszukiwanie kodów Polskiej Klasyfikacji Działalności (PKD) za pomocą algorytmu AI."
    }
    </script>

    <!-- Service worker registration for bfcache support -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/bfcache-sw.js')
            .then(registration => {
              console.log('BFCache SW registered:', registration.scope);
            })
            .catch(error => {
              console.log('BFCache SW registration failed:', error);
            });
        });
      }
      
      // Prevent unload handlers (which can interfere with bfcache)
      window.addEventListener('beforeunload', (e) => {
        e.preventDefault();
        e.returnValue = false;
        return false;
      }, { capture: true });
      
      // Disconnect network requests on page hide
      document.addEventListener('visibilitychange', () => {
        if (document.visibilityState === 'hidden') {
          // Cancel any pending fetch requests
          const controller = window._abortController;
          if (controller) {
            controller.abort();
            window._abortController = null;
          }
        }
      });
      
      // Store the current page in sessionStorage to help with bfcache restoration
      window.addEventListener('pageshow', (event) => {
        if (event.persisted) {
          // This page was restored from bfcache
          console.log('Page restored from bfcache');
          const urlParams = new URLSearchParams(window.location.search);
          const serviceDescription = urlParams.get('serviceDescription');
          
          if (serviceDescription) {
            // Store that we've handled this URL already
            sessionStorage.setItem('bfcache-restored', 'true');
            sessionStorage.setItem('last-service-description', serviceDescription);
          }
        }
      });
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
